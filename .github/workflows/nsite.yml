name: Deploy nsite
on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: "nsite"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Set build env
        run: |
          echo "VITE_COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "VITE_APP_VERSION=preview" >> $GITHUB_ENV

      - name: Build
        env:
          VITE_TENOR_API_KEY: ${{ secrets.VITE_TENOR_API_KEY }}
        run: pnpm build

      - name: Deploy to nsite
        uses: sandwichfarm/nsite-action@v0.3.0
        with:
          nbunksec: ${{ secrets.NSITE_BUNKER }}
          directory: "./dist"
